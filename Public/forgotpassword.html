<!DOCTYPE html>
<html lang="en">
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="iforgotpassword">
    <h2>Forgot Password</h2>

    <!-- Step 1: Enter Email to Get OTP -->
    <form id="forgot-password-form">
        <input id="forgot-email" type="email" placeholder="Your email" required>
        <button type="submit">Send OTP</button>
        <small class="forgotpasserror-message"></small>
    </form>

    <!-- Step 2: Enter OTP and New Password -->
    <form id="forgotpassotp-form" style="display:none;">
        <input id="forgotpassotp" type="text" placeholder="OTP" required>
        <input id="forgotpassandnew-password" type="password" placeholder="New Password" required>
        <button type="submit">Reset Password</button>
        <small class="forgotpasserror-message"></small>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
